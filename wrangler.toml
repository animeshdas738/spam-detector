name = "spam-detector"
main = "dist/_worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Static assets ─────────────────────────────────────────────────────────────
# Served directly from Cloudflare's edge CDN; _worker.js is excluded via
# dist/.assetsignore so it is never served as a public file.
[assets]
directory = "./dist"
binding = "ASSETS"

# ── Required secrets (encrypted — never stored in this file) ──────────────────
# Set each secret once with the Wrangler CLI:
#
#   wrangler secret put OPENAI_API_KEY
#
# Wrangler will prompt for the value and store it encrypted in Cloudflare.
# For local development, copy the values to .dev.vars (gitignored):
#
#   OPENAI_API_KEY=sk-proj-...
#
# Required secrets:
#   OPENAI_API_KEY — OpenAI API key used by /api/detect to run spam analysis
#   DATABASE_URL   — PostgreSQL connection URL used by /api/report to store reported issues

# ── Non-secret config vars (safe to commit) ───────────────────────────────────
# [vars]
# EXAMPLE_PUBLIC_VAR = "value"
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

